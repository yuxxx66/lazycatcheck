name: 📊 懒猫库存监控 

on:
  schedule:
    # 每分钟执行一次
    - cron: '* */10 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["📊 库存监控"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: server-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: 🚀 运行库存监控
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FID: '25'
        run: python server.py
      
      - name: 📤 提交数据变化
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add server_data/
          git commit -m "📊 更新库存数据 $(date '+%Y-%m-%d %H:%M:%S')" || echo "无数据变化"
          git push
      
      - name: ⏱️ 提交执行时间
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p server_monitor && echo "$(date +'%Y-%m-%d %H:%M:%S')" > server_monitor/time.txt
          git add server_monitor/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "⏱️ 更新 server_monitor 执行时间: $TIMESTAMP"
            git fetch origin main
            git push -f origin HEAD:main
            echo "✅ 更改已推送"
          fi
      
      - name: ⏳ 等待后重新触发
        if: always()
        run: |
          echo "等待 20 秒后重新触发..."
          sleep 20
          gh workflow run "${{ github.workflow }}" --ref "${{ github.ref }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
