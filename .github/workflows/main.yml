name: 📊 懒猫库存监控 

on:
  schedule:
    # 每 10 分钟执行一次
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
  SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
  TG_TOKEN: ${{ secrets.TG_TOKEN }}
  TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

permissions:
  contents: write

concurrency:
  group: server-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: � 安装 Hysteria2
        run: |
          if [ -n "${{ env.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi
      
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 requests[socks]
      
      - name: 🚀 运行库存监控
        env:
          FID: '25'
        run: python server.py
      
      - name: 📤 提交数据变化和执行时间
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 添加库存数据
          git add server_data/ 2>/dev/null || true
          
          # 添加执行时间
          mkdir -p server_monitor && echo "$(date +'%Y-%m-%d %H:%M:%S')" > server_monitor/time.txt
          git add server_monitor/time.txt 2>/dev/null || true
          
          # 检查是否有变化
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
            git commit -m "📊 更新库存数据和执行时间: $TIMESTAMP"
            git push
            echo "✅ 更改已推送"
          fi
